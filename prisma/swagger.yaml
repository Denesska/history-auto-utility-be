openapi: "3.0.0"
paths:
  /api/car:
    post:
      operationId: "CarController_createCar"
      summary: "Create a new car"
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddCarDto"
      responses:
        201:
          description: "Car created successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        403:
          description: "Forbidden."
      tags:
        - "car"
      security:
        - cookie: []
    put:
      operationId: "CarController_updateCar"
      summary: "Update a car"
      parameters: []
      responses:
        200:
          description: "Car updated successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
    get:
      operationId: "CarController_getAllCars"
      summary: "Get all cars for authenticated user"
      parameters: []
      responses:
        200:
          description: "Return list of cars."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CarDto"
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/{id}:
    get:
      operationId: "CarController_getCar"
      summary: "Get car by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return car details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
    delete:
      operationId: "CarController_deleteCar"
      summary: "Delete a car"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Car deleted successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/photo/{photoId}:
    delete:
      operationId: "CarController_deletePhoto"
      summary: "Delete a car photo"
      parameters:
        - name: "photoId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        204:
          description: "Photo deleted."
        404:
          description: "Photo not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/photo/{photoId}/default:
    patch:
      operationId: "CarController_setDefaultPhoto"
      summary: "Set a photo as the default for its car"
      parameters:
        - name: "photoId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        204:
          description: "Default photo updated."
        404:
          description: "Photo not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/user/{userId}:
    get:
      operationId: "CarController_getCarsByUser"
      summary: "Get all cars for a specific user"
      parameters:
        - name: "userId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return list of cars."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CarDto"
      tags:
        - "car"
      security:
        - cookie: []
  /api/maintenance-record:
    post:
      operationId: "MaintenanceRecordController_createMaintenanceRecord"
      summary: "Create a new maintenance record"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceRecordDto"
      responses:
        201:
          description: "The maintenance record has been successfully created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/maintenance-record/{id}:
    get:
      operationId: "MaintenanceRecordController_getMaintenanceRecord"
      summary: "Get maintenance record by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return maintenance record details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
    put:
      operationId: "MaintenanceRecordController_updateMaintenanceRecord"
      summary: "Update a maintenance record"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaintenanceRecordDto"
      responses:
        200:
          description: "The maintenance record has been successfully updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
    delete:
      operationId: "MaintenanceRecordController_deleteMaintenanceRecord"
      summary: "Delete a maintenance record"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "The maintenance record has been successfully deleted."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/maintenance-record/car/{carId}:
    get:
      operationId: "MaintenanceRecordController_getMaintenanceRecordsByCarId"
      summary: "Get all maintenance records for a specific car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return list of maintenance records."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance records not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/document:
    post:
      operationId: "DocumentController_createDocument"
      summary: "Create a new document"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentDto"
      responses:
        201:
          description: "The document has been successfully created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        403:
          description: "Forbidden."
      tags:
        - "document"
  /api/document/{id}:
    get:
      operationId: "DocumentController_getDocument"
      summary: "Get document by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return document details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Document not found."
      tags:
        - "document"
    put:
      operationId: "DocumentController_updateDocument"
      summary: "Update a document"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentDto"
      responses:
        200:
          description: "The document has been successfully updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Document not found."
      tags:
        - "document"
    delete:
      operationId: "DocumentController_deleteDocument"
      summary: "Delete a document"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "The document has been successfully deleted."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Document not found."
      tags:
        - "document"
  /api/document/car/{carId}:
    get:
      operationId: "DocumentController_getDocumentsByCarId"
      summary: "Get all documents for a specific car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return list of documents."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Documents not found."
      tags:
        - "document"
  /api/auth/google:
    get:
      operationId: "AuthController_login"
      summary: "Initiate Google OAuth login"
      parameters: []
      responses:
        200:
          description: ""
      tags:
        - "auth"
  /api/auth/google/redirect:
    get:
      operationId: "AuthController_googleAuthRedirect"
      summary: "Handle Google OAuth callback"
      parameters: []
      responses:
        302:
          description: "Authenticated and redirected to frontend."
        401:
          description: "Google authentication failed."
      tags:
        - "auth"
  /api/auth/refresh:
    post:
      operationId: "AuthController_refreshAccessToken"
      summary: "Refresh access token"
      parameters: []
      responses:
        200:
          description: "New access token issued."
        401:
          description: "Refresh token missing or invalid."
      tags:
        - "auth"
  /api/auth/me:
    get:
      operationId: "AuthController_getProfile"
      summary: "Get authenticated user profile"
      parameters: []
      responses:
        200:
          description: "User profile returned."
        401:
          description: "Invalid or missing access token."
      tags:
        - "auth"
  /api/auth/logout:
    post:
      operationId: "AuthController_logout"
      summary: "Logout user and invalidate tokens"
      parameters: []
      responses:
        200:
          description: "Logged out successfully."
        401:
          description: "Not authenticated."
      tags:
        - "auth"
info:
  title: "History Auto Utility API"
  description: "API documentation for History Auto Utility"
  version: "1.0"
  contact: {}
tags: []
servers:
  - url: "http://localhost:3000"
    description: "development"
components:
  securitySchemes:
    bearer:
      scheme: "bearer"
      bearerFormat: "JWT"
      type: "http"
  schemas:
    AddCarDto:
      type: "object"
      properties:
        id:
          type: "number"
          example: "6"
        make:
          type: "string"
          example: "BMW"
        model:
          type: "string"
          example: "520i"
        variant:
          type: "string"
          example: "M Sport"
        license_plate:
          type: "string"
          example: "IS49WAU"
        vin:
          type: "string"
          example: "WBAHE21060GE64612"
        year:
          type: "number"
          example: 2006
        fuel_type:
          type: "string"
          example: "PETROL"
          enum:
            - "PETROL"
            - "DIESEL"
            - "HYBRID"
            - "PLUGIN_HYBRID"
            - "ELECTRIC"
            - "LPG"
        transmission:
          type: "string"
          example: "MANUAL"
          enum:
            - "MANUAL"
            - "AUTOMATIC"
            - "SEMI_AUTOMATIC"
        engine:
          type: "string"
          example: "2.0L Turbo"
        color:
          type: "string"
          example: "#1A2B3C"
        current_mileage:
          type: "number"
          example: 184200
        ownership_start_date:
          type: "string"
          example: "2024-05-12T00:00:00.000Z"
        rca_expiry_date:
          type: "string"
          example: "2026-03-10T00:00:00.000Z"
        itp_expiry_date:
          type: "string"
          example: "2026-04-20T00:00:00.000Z"
        rov_expiry_date:
          type: "string"
          example: "2026-05-15T00:00:00.000Z"
        last_oil_service_date:
          type: "string"
          example: "2026-03-12T00:00:00.000Z"
        last_oil_service_mileage:
          type: "number"
          example: 180000
        default_new_photo_index:
          type: "number"
          example: 0
      required:
        - "id"
        - "make"
        - "model"
        - "variant"
        - "license_plate"
        - "vin"
        - "year"
        - "fuel_type"
        - "transmission"
        - "engine"
        - "color"
        - "current_mileage"
        - "ownership_start_date"
        - "rca_expiry_date"
        - "itp_expiry_date"
        - "rov_expiry_date"
        - "last_oil_service_date"
        - "last_oil_service_mileage"
        - "default_new_photo_index"
    CarPhotoDto:
      type: "object"
      properties:
        id:
          type: "number"
          example: 1
        url:
          type: "string"
          example: "/uploads/cars/photo.jpg"
        is_default:
          type: "boolean"
          example: false
      required:
        - "id"
        - "url"
        - "is_default"
    CarDto:
      type: "object"
      properties:
        id:
          type: "number"
          example: 1
        user_id:
          type: "number"
          example: 123
        vin:
          type: "string"
          example: "1HGCM82633A123456"
        make:
          type: "string"
          example: "BMW"
        model:
          type: "string"
          example: "530iA"
        variant:
          type: "string"
          example: "M Sport"
        year:
          type: "number"
          example: 1992
        license_plate:
          type: "string"
          example: "IS49WAU"
        fuel_type:
          type: "string"
          example: "PETROL"
          enum:
            - "PETROL"
            - "DIESEL"
            - "HYBRID"
            - "PLUGIN_HYBRID"
            - "ELECTRIC"
            - "LPG"
        transmission:
          type: "string"
          example: "MANUAL"
          enum:
            - "MANUAL"
            - "AUTOMATIC"
            - "SEMI_AUTOMATIC"
        engine:
          type: "string"
          example: "2.0L Turbo"
        color:
          type: "string"
          example: "#1A2B3C"
        current_mileage:
          type: "number"
          example: 184200
        ownership_start_date:
          format: "date-time"
          type: "string"
          example: "2024-05-12T00:00:00.000Z"
        rca_expiry_date:
          format: "date-time"
          type: "string"
          example: "2026-03-10T00:00:00.000Z"
        itp_expiry_date:
          format: "date-time"
          type: "string"
          example: "2026-04-20T00:00:00.000Z"
        rov_expiry_date:
          format: "date-time"
          type: "string"
          example: "2026-05-15T00:00:00.000Z"
        last_oil_service_date:
          format: "date-time"
          type: "string"
          example: "2026-03-12T00:00:00.000Z"
        last_oil_service_mileage:
          type: "number"
          example: 180000
        photos:
          type: "array"
          items:
            $ref: "#/components/schemas/CarPhotoDto"
      required:
        - "id"
        - "user_id"
        - "vin"
        - "make"
        - "model"
        - "variant"
        - "year"
        - "license_plate"
        - "fuel_type"
        - "transmission"
        - "engine"
        - "color"
        - "current_mileage"
        - "ownership_start_date"
        - "rca_expiry_date"
        - "itp_expiry_date"
        - "rov_expiry_date"
        - "last_oil_service_date"
        - "last_oil_service_mileage"
        - "photos"
    CreateMaintenanceRecordDto:
      type: "object"
      properties:
        car_id:
          type: "number"
          example: "123"
        service_date:
          format: "date-time"
          type: "string"
          example: "2023-01-01T00:00:00.000Z"
        mileage:
          type: "number"
          example: "380000"
        description:
          type: "string"
          example: "Oil 10W40, air filter MANN"
        service_type:
          type: "string"
          example: "MAINTENANCE"
          enum:
            - "REPAIR"
            - "MAINTENANCE"
            - "IMPROVEMENT"
        service_category:
          type: "string"
          example: "OIL_CHANGE"
          enum:
            - "OIL_CHANGE"
            - "BRAKE_SERVICE"
            - "TRANSMISSION_SERVICE"
            - "TIRE_SERVICE"
            - "OTHER"
        cost:
          type: "number"
          example: "Insurance"
        expiry_date:
          format: "date-time"
          type: "string"
          example: "Insurance"
      required:
        - "car_id"
        - "service_date"
        - "mileage"
        - "description"
        - "service_type"
        - "service_category"
        - "cost"
        - "expiry_date"
    MaintenanceRecordDto:
      type: "object"
      properties:
        id:
          type: "number"
          example: "123"
        car_id:
          type: "number"
          example: "123"
        service_date:
          format: "date-time"
          type: "string"
          example: "2023-01-01T00:00:00.000Z"
        mileage:
          type: "number"
          example: "380000"
        description:
          type: "string"
          example: "Oil 10W40, air filter MANN"
        service_type:
          type: "string"
          example: "MAINTENANCE"
          enum:
            - "REPAIR"
            - "MAINTENANCE"
            - "IMPROVEMENT"
        service_category:
          type: "string"
          example: "OIL_CHANGE"
          enum:
            - "OIL_CHANGE"
            - "BRAKE_SERVICE"
            - "TRANSMISSION_SERVICE"
            - "TIRE_SERVICE"
            - "OTHER"
        cost:
          type: "number"
          example: "Insurance"
        expiry_date:
          format: "date-time"
          type: "string"
          example: "Insurance"
      required:
        - "id"
        - "car_id"
        - "service_date"
        - "mileage"
        - "description"
        - "service_type"
        - "service_category"
        - "cost"
        - "expiry_date"
    UpdateMaintenanceRecordDto:
      type: "object"
      properties: {}
    CreateDocumentDto:
      type: "object"
      properties:
        document_type:
          type: "string"
          example: "Insurance"
        issue_date:
          format: "date-time"
          type: "string"
          example: "2023-01-01T00:00:00.000Z"
        expiry_date:
          format: "date-time"
          type: "string"
          example: "2024-01-01T00:00:00.000Z"
        car_id:
          type: "number"
          example: 1
      required:
        - "document_type"
        - "issue_date"
        - "expiry_date"
        - "car_id"
    DocumentDto:
      type: "object"
      properties:
        id:
          type: "number"
          example: 1
        document_type:
          type: "string"
          example: "Insurance"
        issue_date:
          format: "date-time"
          type: "string"
          example: "2023-01-01T00:00:00.000Z"
        expiry_date:
          format: "date-time"
          type: "string"
          example: "2024-01-01T00:00:00.000Z"
        car_id:
          type: "number"
          example: 1
      required:
        - "id"
        - "document_type"
        - "issue_date"
        - "expiry_date"
        - "car_id"
    UpdateDocumentDto:
      type: "object"
      properties: {}
