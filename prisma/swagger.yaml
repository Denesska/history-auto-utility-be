openapi: "3.0.0"
paths:
  /api/car/shared:
    get:
      operationId: "CarAccessController_getSharedCars"
      summary: "Get all cars shared with the current user"
      parameters: []
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/SharedCarDto"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access:
    get:
      operationId: "CarAccessController_getAccessList"
      summary: "List all users with access to a car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CarAccessDto"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access/invite:
    post:
      operationId: "CarAccessController_inviteUser"
      summary: "Invite a registered user to access a car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserDto"
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarAccessDto"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access/accept:
    post:
      operationId: "CarAccessController_acceptInvitation"
      summary: "Accept a pending invitation to a car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarAccessDto"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access/{targetUserId}/role:
    patch:
      operationId: "CarAccessController_changeRole"
      summary: "Change the role of a user on a car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
        - name: "targetUserId"
          required: true
          in: "path"
          schema:
            type: "number"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRoleDto"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarAccessDto"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access/leave:
    delete:
      operationId: "CarAccessController_leaveAccess"
      summary: "Leave (remove yourself from) a shared car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        204:
          description: "Access removed"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car/{carId}/access/{targetUserId}:
    delete:
      operationId: "CarAccessController_removeAccess"
      summary: "Remove a user's access to a car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "number"
        - name: "targetUserId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        204:
          description: "Access removed"
      tags:
        - "car-access"
      security:
        - cookie: []
  /api/car:
    post:
      operationId: "CarController_createCar"
      summary: "Create a new car"
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddCarDto"
      responses:
        201:
          description: "Car created successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        403:
          description: "Forbidden."
      tags:
        - "car"
      security:
        - cookie: []
    put:
      operationId: "CarController_updateCar"
      summary: "Update a car"
      parameters: []
      responses:
        200:
          description: "Car updated successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
    get:
      operationId: "CarController_getAllCars"
      summary: "Get all cars for authenticated user"
      parameters: []
      responses:
        200:
          description: "Return list of cars."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CarDto"
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/{id}:
    get:
      operationId: "CarController_getCar"
      summary: "Get car by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return car details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
    delete:
      operationId: "CarController_deleteCar"
      summary: "Delete a car"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Car deleted successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        404:
          description: "Car not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/photo/{photoId}:
    delete:
      operationId: "CarController_deletePhoto"
      summary: "Delete a car photo"
      parameters:
        - name: "photoId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        204:
          description: "Photo deleted."
        404:
          description: "Photo not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/photo/{photoId}/default:
    patch:
      operationId: "CarController_setDefaultPhoto"
      summary: "Set a photo as the default for its car"
      parameters:
        - name: "photoId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        204:
          description: "Default photo updated."
        404:
          description: "Photo not found."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/{id}/sold:
    patch:
      operationId: "CarController_markAsSold"
      summary: "Mark a car as sold (archive)"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Car marked as sold."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        403:
          description: "Only the owner can archive this car."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/{id}/restore:
    patch:
      operationId: "CarController_restoreCar"
      summary: "Restore a sold car back to active"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Car restored to active."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarDto"
        403:
          description: "Only the owner can restore this car."
      tags:
        - "car"
      security:
        - cookie: []
  /api/car/user/{userId}:
    get:
      operationId: "CarController_getCarsByUser"
      summary: "Get all cars for a specific user"
      parameters:
        - name: "userId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return list of cars."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/CarDto"
      tags:
        - "car"
      security:
        - cookie: []
  /api/vehicle-catalog/makes:
    get:
      operationId: "VehicleCatalogController_getMakes"
      summary: "List all car makes"
      parameters: []
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/MakeResponseDto"
      tags:
        - "vehicle-catalog"
  /api/vehicle-catalog/makes/{makeId}/models:
    get:
      operationId: "VehicleCatalogController_getModels"
      summary: "List models for a given make"
      parameters:
        - name: "makeId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/ModelResponseDto"
      tags:
        - "vehicle-catalog"
  /api/vehicle-catalog/models/{modelId}/years:
    get:
      operationId: "VehicleCatalogController_getYears"
      summary: "List years for a given model"
      parameters:
        - name: "modelId"
          required: true
          in: "path"
          schema:
            type: "number"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/YearResponseDto"
      tags:
        - "vehicle-catalog"
  /api/maintenance-record:
    post:
      operationId: "MaintenanceRecordController_createMaintenanceRecord"
      summary: "Create a new maintenance record"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceRecordDto"
      responses:
        201:
          description: "The maintenance record has been successfully created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/maintenance-record/{id}:
    get:
      operationId: "MaintenanceRecordController_getMaintenanceRecord"
      summary: "Get maintenance record by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return maintenance record details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
    put:
      operationId: "MaintenanceRecordController_updateMaintenanceRecord"
      summary: "Update a maintenance record"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaintenanceRecordDto"
      responses:
        200:
          description: "The maintenance record has been successfully updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
    delete:
      operationId: "MaintenanceRecordController_deleteMaintenanceRecord"
      summary: "Delete a maintenance record"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "The maintenance record has been successfully deleted."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordDto"
        404:
          description: "Maintenance record not found."
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/maintenance-record/car/{carId}:
    get:
      operationId: "MaintenanceRecordController_getMaintenanceRecordsByCarId"
      summary: "Get all maintenance records for a specific car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: "Return list of maintenance records."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/MaintenanceRecordDto"
      tags:
        - "maintenance-record"
      security:
        - bearer: []
  /api/document:
    post:
      operationId: "DocumentController_createDocument"
      summary: "Create a new document"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentDto"
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
      tags:
        - "document"
  /api/document/{id}:
    get:
      operationId: "DocumentController_getDocument"
      summary: "Get document by ID"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Document not found."
      tags:
        - "document"
    put:
      operationId: "DocumentController_updateDocument"
      summary: "Update a document"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentDto"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
        404:
          description: "Document not found."
      tags:
        - "document"
    delete:
      operationId: "DocumentController_deleteDocument"
      summary: "Delete a document"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
      tags:
        - "document"
  /api/document/car/{carId}:
    get:
      operationId: "DocumentController_getDocumentsByCarId"
      summary: "Get all documents for a specific car"
      parameters:
        - name: "carId"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/DocumentDto"
      tags:
        - "document"
  /api/document/extract:
    post:
      operationId: "DocumentController_extractDocument"
      summary: "Extract fields from an uploaded document file (returns suggestions only — does not save)"
      description: "Upload a PDF document to have its fields extracted and returned as suggestions. No data is stored. The user must review and confirm the extracted values before saving. Currently supports Romanian RCA insurance PDFs."
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: "object"
              properties:
                file:
                  type: "string"
                  format: "binary"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResultDto"
        400:
          description: "No file provided or file could not be read."
        415:
          description: "Unsupported file type."
      tags:
        - "document"
  /api/document/{id}/upload:
    post:
      operationId: "DocumentController_uploadFile"
      summary: "Upload a file for a document"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: "object"
              properties:
                file:
                  type: "string"
                  format: "binary"
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
      tags:
        - "document"
  /api/blog/images:
    post:
      operationId: "BlogController_uploadImage"
      summary: "Upload a blog image"
      parameters: []
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                properties:
                  url:
                    type: "string"
      tags:
        - "blog"
      security:
        - bearer: []
  /api/blog/categories/vehicle:
    get:
      operationId: "BlogController_getVehicleCategories"
      summary: "Get all vehicle entry categories"
      parameters: []
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/VehicleCategoryDto"
      tags:
        - "blog"
      security:
        - bearer: []
  /api/blog:
    get:
      operationId: "BlogController_getEntries"
      summary: "Get all blog entries for authenticated user"
      parameters:
        - name: "category"
          required: false
          in: "query"
          schema:
            enum:
              - "PERSONAL"
              - "VEHICLE"
            type: "string"
        - name: "car_id"
          required: false
          in: "query"
          schema:
            type: "number"
        - name: "vehicle_category"
          required: false
          in: "query"
          schema:
            enum:
              - "REPAIR"
              - "SERVICE_VISIT"
              - "TRIP"
              - "FUEL"
              - "UPGRADE"
              - "INSPECTION"
              - "BREAKDOWN"
              - "OTHER"
            type: "string"
        - name: "search"
          required: false
          in: "query"
          description: "Search in title and content"
          schema:
            type: "string"
        - name: "is_pinned"
          required: false
          in: "query"
          schema:
            type: "boolean"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/BlogEntryDto"
      tags:
        - "blog"
      security:
        - bearer: []
    post:
      operationId: "BlogController_createEntry"
      summary: "Create a blog entry"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogEntryDto"
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogEntryDto"
      tags:
        - "blog"
      security:
        - bearer: []
  /api/blog/{id}:
    get:
      operationId: "BlogController_getEntry"
      summary: "Get a single blog entry"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogEntryDto"
        404:
          description: "Not found"
      tags:
        - "blog"
      security:
        - bearer: []
    put:
      operationId: "BlogController_updateEntry"
      summary: "Update a blog entry"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogEntryDto"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogEntryDto"
      tags:
        - "blog"
      security:
        - bearer: []
    delete:
      operationId: "BlogController_deleteEntry"
      summary: "Delete a blog entry"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogEntryDto"
      tags:
        - "blog"
      security:
        - bearer: []
  /api/blog/{id}/pin:
    patch:
      operationId: "BlogController_togglePin"
      summary: "Toggle pin on a blog entry"
      parameters:
        - name: "id"
          required: true
          in: "path"
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogEntryDto"
      tags:
        - "blog"
      security:
        - bearer: []
  /api/version:
    get:
      operationId: "AppVersionController_getVersion"
      summary: "Get current backend version"
      parameters: []
      responses:
        200:
          description: "Returns the current app version"
      tags:
        - "version"
  /api/auth/google:
    get:
      operationId: "AuthController_login"
      summary: "Initiate Google OAuth login"
      parameters: []
      responses:
        200:
          description: ""
      tags:
        - "auth"
  /api/auth/google/redirect:
    get:
      operationId: "AuthController_googleAuthRedirect"
      summary: "Handle Google OAuth callback"
      parameters: []
      responses:
        302:
          description: "Authenticated and redirected to frontend."
        401:
          description: "Google authentication failed."
      tags:
        - "auth"
  /api/auth/refresh:
    post:
      operationId: "AuthController_refreshAccessToken"
      summary: "Refresh access token"
      parameters: []
      responses:
        200:
          description: "New access token issued."
        401:
          description: "Refresh token missing or invalid."
      tags:
        - "auth"
  /api/auth/me:
    get:
      operationId: "AuthController_getProfile"
      summary: "Get authenticated user profile"
      parameters: []
      responses:
        200:
          description: "User profile returned."
        401:
          description: "Invalid or missing access token."
      tags:
        - "auth"
  /api/auth/logout:
    post:
      operationId: "AuthController_logout"
      summary: "Logout user and invalidate tokens"
      parameters: []
      responses:
        200:
          description: "Logged out successfully."
        401:
          description: "Not authenticated."
      tags:
        - "auth"
info:
  title: "History Auto Utility API"
  description: "API documentation for History Auto Utility"
  version: "1.0"
  contact: {}
tags: []
servers:
  - url: "http://localhost:3000"
    description: "development"
components:
  securitySchemes:
    bearer:
      scheme: "bearer"
      bearerFormat: "JWT"
      type: "http"
  schemas:
    SharedCarDto:
      type: "object"
      properties:
        id:
          type: "number"
        make:
          type: "string"
        model:
          type: "string"
        variant:
          type: "string"
        year:
          type: "number"
        license_plate:
          type: "string"
        shared_role:
          type: "string"
          enum:
            - "OWNER"
            - "FULL"
            - "USER"
            - "MAINTENANCE"
            - "VIEWER"
        accepted_at:
          format: "date-time"
          type: "string"
      required:
        - "id"
        - "make"
        - "model"
        - "year"
        - "license_plate"
        - "shared_role"
    CarAccessUserDto:
      type: "object"
      properties:
        id:
          type: "number"
        email:
          type: "string"
        first_name:
          type: "string"
        last_name:
          type: "string"
        picture:
          type: "string"
      required:
